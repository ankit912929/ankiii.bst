<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BST Hard MCQ | Class 12 CBSE 2025-26</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --s1: #141414;
  --s2: #1c1c1c;
  --s3: #242424;
  --border: #2a2a2a;
  --text: #e8e8e8;
  --muted: #666;
  --dim: #444;
  --accent: #ff6b35;
  --accent2: #4ecdc4;
  --gold: #ffd166;
  --correct: #06d6a0;
  --wrong: #ef476f;
  --blue: #118ab2;
  --purple: #9b5de5;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
/* noise overlay */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;
}

.wrap{max-width:800px;margin:0 auto;padding:0 16px 80px;position:relative;z-index:1;}

/* ── HEADER ── */
.hd{padding:32px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px;animation:fd .5s ease;}
.hd-eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.hd-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,7vw,64px);line-height:.95;letter-spacing:1px;}
.hd-title .r{color:var(--accent);}
.hd-title .g{color:var(--accent2);}
.hd-sub{font-size:12px;color:var(--muted);margin-top:10px;letter-spacing:1px;}
.diff-pills{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.pill{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:3px;}
.pill-m{background:rgba(255,209,102,.1);color:var(--gold);border:1px solid rgba(255,209,102,.25);}
.pill-h{background:rgba(255,107,53,.1);color:var(--accent);border:1px solid rgba(255,107,53,.25);}
.pill-c{background:rgba(78,205,196,.1);color:var(--accent2);border:1px solid rgba(78,205,196,.25);}

/* ── SCOREBAR ── */
.sbar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:18px;animation:fd .5s ease .1s both;}
.sc{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:10px 6px;text-align:center;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;}
.sv.c{color:var(--correct);}
.sv.w{color:var(--wrong);}
.sv.g{color:var(--gold);}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-top:1px;}

/* ── PROGRESS ── */
.prog-wrap{margin-bottom:22px;display:flex;align-items:center;gap:10px;}
.prog-track{flex:1;height:3px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .5s cubic-bezier(.34,1.56,.64,1);width:0%;}
.prog-txt{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap;}

/* ── QUESTION CARD ── */
.qcard{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:14px;
  padding:24px 22px 20px;
  margin-bottom:14px;
  animation:slIn .35s ease;
  position:relative;
  overflow:hidden;
}
.qcard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent2),var(--accent),var(--purple));
}

/* TYPE BADGE */
.tbadge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:3px 10px;border-radius:3px;margin-bottom:10px;
}
.tb-case{background:rgba(255,107,53,.12);color:var(--accent);border:1px solid rgba(255,107,53,.3);}
.tb-ar{background:rgba(17,138,178,.12);color:var(--blue);border:1px solid rgba(17,138,178,.3);}
.tb-st{background:rgba(6,214,160,.12);color:var(--correct);border:1px solid rgba(6,214,160,.3);}
.tb-dir{background:rgba(255,209,102,.12);color:var(--gold);border:1px solid rgba(255,209,102,.3);}
.tb-seq{background:rgba(155,93,229,.12);color:var(--purple);border:1px solid rgba(155,93,229,.3);}
.tb-mt{background:rgba(78,205,196,.12);color:var(--accent2);border:1px solid rgba(78,205,196,.3);}

.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.qnum{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.qunit{font-size:10px;color:var(--muted);background:var(--s2);border:1px solid var(--border);padding:2px 10px;border-radius:3px;letter-spacing:.5px;}

/* DIFF TAG */
.diff-tag{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:3px;margin-left:6px;}
.dt-m{background:rgba(255,209,102,.15);color:var(--gold);}
.dt-h{background:rgba(255,107,53,.15);color:var(--accent);}

.qtext{font-size:15px;line-height:1.75;color:var(--text);margin-bottom:18px;font-weight:400;}
.qtext strong{color:white;font-weight:600;}

/* CASE BOX */
.casebox{
  background:var(--s2);border-left:2px solid var(--accent);
  border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:16px;
  font-size:13.5px;line-height:1.75;color:#aaa;
}

/* A-R BOX */
.arbox{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.arrow{
  background:rgba(17,138,178,.08);border:1px solid rgba(17,138,178,.2);
  border-radius:8px;padding:10px 14px;font-size:13.5px;line-height:1.65;color:#bbb;
}
.arrow strong{color:var(--blue);font-weight:700;}

/* STMT BOX */
.stbox{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.strow{
  background:rgba(6,214,160,.06);border:1px solid rgba(6,214,160,.18);
  border-radius:8px;padding:10px 14px;font-size:13.5px;line-height:1.65;color:#bbb;
}
.strow strong{color:var(--correct);font-weight:700;}

/* TABLE */
.mtable{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px;}
.mtable th{background:var(--s2);padding:9px 12px;text-align:left;border:1px solid var(--border);color:var(--accent2);font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;}
.mtable td{padding:9px 12px;border:1px solid var(--border);color:#aaa;line-height:1.5;}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 16px;border:1px solid var(--border);
  border-radius:8px;cursor:pointer;background:var(--s2);
  transition:all .16s ease;user-select:none;
}
.opt:hover:not(.locked){border-color:var(--accent2);background:rgba(78,205,196,.06);transform:translateX(4px);}
.okey{
  width:26px;height:26px;border-radius:5px;background:var(--s3);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.5px;
  color:var(--muted);flex-shrink:0;transition:all .16s;margin-top:1px;
}
.otxt{font-size:14px;line-height:1.55;color:#ccc;flex:1;}
.oico{font-size:14px;opacity:0;transform:scale(0);transition:all .2s cubic-bezier(.34,1.56,.64,1);margin-top:2px;}

.opt.correct{border-color:var(--correct);background:rgba(6,214,160,.07);}
.opt.correct .okey{background:var(--correct);color:#000;}
.opt.correct .otxt{color:var(--text);font-weight:500;}
.opt.correct .oico{opacity:1;transform:scale(1);}

.opt.wrong{border-color:var(--wrong);background:rgba(239,71,111,.07);}
.opt.wrong .okey{background:var(--wrong);color:white;}
.opt.wrong .oico{opacity:1;transform:scale(1);}

.opt.dim{opacity:.3;}
.opt.locked{cursor:default;transform:none!important;}

/* EXP */
.expbox{
  display:none;margin-top:14px;
  background:rgba(255,209,102,.05);border:1px solid rgba(255,209,102,.15);
  border-left:2px solid var(--gold);border-radius:0 8px 8px 0;
  padding:12px 16px;font-size:13px;line-height:1.68;color:#aaa;
  animation:fd .25s ease;
}
.expbox.show{display:block;}
.expbox strong{color:var(--gold);}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;gap:12px;}
.btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:11px 24px;border-radius:6px;border:none;cursor:pointer;transition:all .16s;}
.btn-nx{background:var(--accent);color:white;}
.btn-nx:hover{background:#e85a28;transform:translateY(-2px);box-shadow:0 8px 20px rgba(255,107,53,.3);}
.btn-nx:disabled{opacity:.25;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-pv{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-pv:hover{border-color:var(--dim);color:var(--text);}
.btn-pv:disabled{opacity:.2;cursor:not-allowed;}

/* ── RESULT ── */
.result{
  display:none;background:var(--s1);border:1px solid var(--border);
  border-radius:16px;padding:48px 28px 40px;text-align:center;
  animation:fd .5s ease;
}
.result.show{display:block;}
.ring{
  width:130px;height:130px;border-radius:50%;
  border:3px solid var(--gold);
  background:rgba(255,209,102,.06);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 24px;
}
.rscore{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:2px;color:var(--accent);line-height:1;}
.rdenom{font-size:13px;color:var(--muted);}
.rtitle{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;margin-bottom:6px;}
.rmsg{font-size:14px;color:var(--muted);margin-bottom:28px;}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:380px;margin:0 auto 28px;}
.rc{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:14px 8px;}
.rv{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;}
.rv.c{color:var(--correct);}
.rv.w{color:var(--wrong);}
.rv.g{color:var(--gold);}
.rl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-top:3px;}

/* chapter report */
.crep{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:16px 20px;max-width:520px;margin:0 auto 28px;text-align:left;}
.crep-hd{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px;font-weight:700;}
.crow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
.crow:last-child{border-bottom:none;}
.cn{color:#aaa;}
.cs{font-weight:700;font-size:11px;}
.cs.good{color:var(--correct);}
.cs.ok{color:var(--gold);}
.cs.bad{color:var(--wrong);}

/* Perf bar */
.perfbar{height:4px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:4px;}
.perfbar-fill{height:100%;border-radius:99px;transition:width 1s ease .3s;}
.pfgood{background:var(--correct);}
.pfok{background:var(--gold);}
.pfbad{background:var(--wrong);}

.btn-rs{
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:white;padding:14px 42px;border-radius:6px;border:none;cursor:pointer;transition:all .16s;
}
.btn-rs:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(255,107,53,.3);}

/* CONFETTI */
.cf{position:fixed;pointer-events:none;animation:fall linear forwards;z-index:999;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(600deg);opacity:0;}}

/* ANIMS */
@keyframes fd{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
@keyframes slIn{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}

@media(max-width:520px){
  .sbar{grid-template-columns:repeat(3,1fr);}
  .sc:nth-child(4),.sc:nth-child(5){display:none;}
  .hd-title{font-size:42px;}
}
</style>
</head>
<body>
<div class="wrap">

<header class="hd">
  <div class="hd-eyebrow">CBSE · Class XII · Subject Code 054 · 2025-26</div>
  <div class="hd-title">BUSINESS <span class="r">STUDIES</span><br><span class="g">HARD</span> MCQ</div>
  <div class="hd-sub">35 Questions · All 12 Units · Moderate → Hard · PYQ Pattern Exact</div>
  <div class="diff-pills">
    <span class="pill pill-m">⚡ Moderate</span>
    <span class="pill pill-h">🔥 Hard</span>
    <span class="pill pill-c">All Question Types</span>
  </div>
</header>

<!-- SCOREBAR -->
<div class="sbar">
  <div class="sc"><div class="sv" id="sq">1</div><div class="sl">Question</div></div>
  <div class="sc"><div class="sv c" id="sc2">0</div><div class="sl">Correct</div></div>
  <div class="sc"><div class="sv w" id="sw">0</div><div class="sl">Wrong</div></div>
  <div class="sc"><div class="sv g" id="sk">0</div><div class="sl">Skipped</div></div>
  <div class="sc"><div class="sv" id="ss">0</div><div class="sl">Score</div></div>
</div>

<!-- PROGRESS -->
<div class="prog-wrap">
  <div class="prog-track"><div class="prog-bar" id="pb"></div></div>
  <span class="prog-txt" id="pt">1 / 35</span>
</div>

<!-- QUESTION CARD -->
<div class="qcard" id="qcard">
  <div><span class="tbadge" id="tbdg"></span></div>
  <div class="qmeta">
    <span class="qnum" id="qn"></span>
    <span class="qunit" id="qu"></span>
  </div>
  <div class="qtext" id="qt"></div>
  <div id="qex"></div>
  <div class="opts" id="ol"></div>
  <div class="expbox" id="eb"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="btn btn-pv" id="bpv" onclick="go(-1)" disabled>← Prev</button>
  <button class="btn btn-nx" id="bnx" onclick="go(1)">Next →</button>
</div>

<!-- RESULT -->
<div class="result" id="res">
  <div class="ring">
    <div class="rscore" id="rsc">0</div>
    <div class="rdenom">/ 35</div>
  </div>
  <div class="rtitle" id="rt"></div>
  <div class="rmsg" id="rm"></div>
  <div class="rgrid">
    <div class="rc"><div class="rv c" id="rc2">0</div><div class="rl">Correct</div></div>
    <div class="rc"><div class="rv w" id="rw">0</div><div class="rl">Wrong</div></div>
    <div class="rc"><div class="rv g" id="rk">0</div><div class="rl">Skipped</div></div>
  </div>
  <div class="crep" id="crep"></div>
  <button class="btn-rs" onclick="restart()">↺ RESTART</button>
</div>

</div>

<script>
// difficulty: "M" = moderate, "H" = hard
const Q=[
  // ══ UNIT 1: Nature & Significance ══
  {u:"Nature & Significance",diff:"M",type:"dir",
   q:`Which of the following is NOT a function of <strong>Middle Level Management</strong>?`,
   opts:["Interpreting policies framed by top management","Analysing the business environment and implications for the firm's survival","Ensuring their department has necessary personnel","Motivating people in their department to achieve desired objectives"],
   ans:1,
   exp:`<strong>Analysing business environment</strong> is a function of <strong>Top-level management</strong>. Middle management's key job is to interpret and implement policies made by top management, ensure proper staffing in their department, and motivate employees. This appeared in actual CBSE 2024 board paper (Set 66/2/2 Q1).`
  },
  {u:"Nature & Significance",diff:"H",type:"ar",
   ar:[{l:"A",t:"Assertion (A): Management is regarded as a full-fledged profession because it satisfies all the criteria of a profession."},
       {l:"R",t:"Reason (R): Management has a systematic body of knowledge, but registration with a professional body like the Bar Council is NOT mandatory for managers."}],
   q:`Choose the correct alternative:`,
   opts:["Both A and R are true and R is the correct explanation of A.",
         "Both A and R are true but R is NOT the correct explanation of A.",
         "A is false, R is true.",
         "Both A and R are false."],
   ans:2,
   exp:`A is <strong>false</strong> — Management is NOT a full-fledged profession because registration with a professional body is not compulsory (unlike CA, Doctors, Advocates). R is <strong>true</strong> — management does have a systematic body of knowledge but lacks compulsory registration requirement. The "A is false, R is true" pattern is a very hard trap CBSE uses.`
  },

  // ══ UNIT 2: Principles of Management ══
  {u:"Principles of Management",diff:"H",type:"case",
   cs:`Leena is the Operations Manager at a garments trading company. She promoted associate Kushagra to 'Inventory & Order Fulfilment Supervisor'. Kushagra studied two methods — processing orders as they arrive vs. accumulating and processing in batches. He concluded that batch processing minimises cost. Meanwhile, Leena studied several records and determined that the standard time taken to deliver a batch of 100 pieces is 72 hours, which helped her fix labour cost.`,
   q:`Identify the techniques of Scientific Management used by <strong>Kushagra</strong> and <strong>Leena</strong> respectively.`,
   opts:["Motion Study and Time Study","Method Study and Time Study","Fatigue Study and Method Study","Time Study and Method Study"],
   ans:1,
   exp:`<strong>Kushagra</strong> evaluated two alternative methods of order fulfilment to find the most efficient one = <strong>Method Study</strong>. <strong>Leena</strong> used records to determine standard time (72 hours for 100 pieces) to fix labour cost = <strong>Time Study</strong>. This exact case appeared in CBSE SQP 2024-25 Q33, which is one of the hardest identification questions.`
  },
  {u:"Principles of Management",diff:"H",type:"stmt",
   sts:[{l:"I",t:"Statement I: Taylor's Scientific Management and Fayol's Administrative Management are complementary rather than contradictory."},
        {l:"II",t:"Statement II: Taylor developed his principles primarily from the perspective of a top-level executive, while Fayol developed his from a shop-floor worker's perspective."}],
   q:`Choose the correct alternative:`,
   opts:["Both statements are true.","Both statements are false.","Statement I is true, Statement II is false.","Statement II is true, Statement I is false."],
   ans:2,
   exp:`Statement I is <strong>true</strong> — Taylor and Fayol's contributions are complementary (both aimed at improving efficiency). Statement II is <strong>false</strong> — it is the <strong>reverse</strong>: Taylor developed principles from the perspective of a <strong>shop-floor worker/supervisor</strong>, while Fayol developed his from the perspective of a <strong>top-level manager</strong>. This distinction is a favourite CBSE hard question.`
  },

  // ══ UNIT 3: Business Environment ══
  {u:"Business Environment",diff:"M",type:"case",
   cs:`Pace Chartered Accountants is a reputed CA firm that provides services to big MNCs. CAs are required to travel to Delhi and NCR for client visits, so the firm decided to convert its petrol cars to <strong>electric cars</strong> in order to improve the quality of life of people and reduce carbon footprint. The firm also updated its software to the latest GST-compliant accounting platform, replacing its older system.`,
   q:`Identify the dimensions of Business Environment reflected in the two decisions taken by the firm.`,
   opts:["Political and Legal","Legal and Social","Social and Technological","Technological and Political"],
   ans:2,
   exp:`Converting to electric cars to improve quality of life = <strong>Social environment</strong> (social responsibility, community concerns). Updating to new GST-compliant software = <strong>Technological environment</strong> (adoption of new technology). This case appeared in CBSE SQP 2023-24 Q17.`
  },
  {u:"Business Environment",diff:"H",type:"stmt",
   sts:[{l:"I",t:"Statement I: Liberalisation refers to freedom from unnecessary government controls and the integration of the domestic economy with the world economy."},
        {l:"II",t:"Statement II: Privatisation refers to opening up of sectors previously reserved for the public sector to private and foreign companies."}],
   q:`Choose the correct alternative:`,
   opts:["Both statements are true.","Both statements are false.","Statement I is false, Statement II is true.","Statement I is true, Statement II is false."],
   ans:1,
   exp:`Both are <strong>false</strong>! Statement I: <strong>Liberalisation</strong> = freedom from unnecessary govt controls — this part is correct. BUT integration with world economy = <strong>Globalisation</strong>, not Liberalisation. Statement II: What's described (opening reserved sectors to private companies) = <strong>Disinvestment/Privatisation</strong> — BUT opening to foreign companies specifically = <strong>Globalisation/FDI liberalisation</strong>. The definitions have intentional mixed elements — a tough "both false" trap.`
  },

  // ══ UNIT 4: Planning ══
  {u:"Planning",diff:"H",type:"case",
   cs:`Mr. Gun Amroha, GM of Welworth Textiles, regularly scans the business environment and adapts organisational strategies accordingly. Despite his best efforts, he found it difficult to accurately predict future trends. "Even though I analyse everything thoroughly," he said, "there is no guarantee that our plans will work out exactly as we expect — our sales plan last year was perfect on paper but failed due to an unexpected economic slowdown."`,
   q:`Identify the limitation of Planning highlighted by Mr. Gun Amroha's statement.`,
   opts:["Planning leads to rigidity","Planning may not work in a dynamic environment","Planning does not guarantee success","Planning reduces creativity"],
   ans:2,
   exp:`Even after thorough analysis and perfect planning, the result didn't match expectations due to the economic slowdown — this illustrates <strong>"Planning does not guarantee success."</strong> (Success depends on many factors outside the manager's control.) Note: Option B (dynamic environment) is wrong — he DID adapt to environment. The keyword is "no guarantee." This case appeared verbatim in CBSE SQP 2025-26 Q14.`
  },
  {u:"Planning",diff:"H",type:"ar",
   ar:[{l:"A",t:"Assertion (A): Planning is both forward-looking and backward-looking."},
       {l:"R",t:"Reason (R): Plans are made for the future using past data and experience, but their outcome is evaluated after implementation, making it retrospective as well."}],
   q:`Choose the correct alternative:`,
   opts:["Both A and R are true and R is the correct explanation of A.",
         "Both A and R are true but R is NOT the correct explanation of A.",
         "A is true, R is false.",
         "A is false, R is true."],
   ans:0,

  // extra content
  const ex=document.getElementById('qex'); ex.innerHTML='';
  if(q.type==='case') ex.innerHTML=`<div class="casebox">${q.cs}</div>`;
  else if(q.type==='ar') ex.innerHTML=`<div class="arbox">${q.ar.map(r=>`<div class="arrow"><strong>${r.l}:</strong> ${r.t}</div>`).join('')}</div>`;
  else if(q.type==='stmt') ex.innerHTML=`<div class="stbox">${q.sts.map(r=>`<div class="strow"><strong>${r.l}:</strong> ${r.t}</div>`).join('')}</div>`;
  else if(q.type==='match'){
    const m=q.mdata;
    let t=`<div style="overflow-x:auto;margin-bottom:16px"><table class="mtable"><thead><tr><th>${m.cols[0]}</th><th>${m.cols[1]}</th></tr></thead><tbody>`;
    m.rows.forEach(r=>{ t+=`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`; });
    t+=`</tbody></table></div>`; ex.innerHTML=t;
  }

  // options
  const ol=document.getElementById('ol'); ol.innerHTML='';
  ['A','B','C','D'].forEach((lbl,idx)=>{
    const d=document.createElement('div');
    d.className='opt';
    d.innerHTML=`<div class="okey">${lbl}</div><div class="otxt">${q.opts[idx]}</div><span class="oico"></span>`;
    if(done){
      d.classList.add('locked');
      if(idx===q.ans){d.classList.add('correct');d.querySelector('.oico').textContent='✓';}
      else if(idx===answers[i]&&idx!==q.ans){d.classList.add('wrong');d.querySelector('.oico').textContent='✗';}
      else d.classList.add('dim');
    } else {
      d.onclick=()=>pick(i,idx,ol);
    }
    ol.appendChild(d);
  });

  // exp
  const eb=document.getElementById('eb');
  if(done){ eb.innerHTML=`💡 <strong>Explanation:</strong> ${q.exp}`; eb.classList.add('show'); }
  else { eb.classList.remove('show'); eb.innerHTML=''; }

  // stats
  document.getElementById('sq').textContent=i+1;
  document.getElementById('sc2').textContent=correct;
  document.getElementById('sw').textContent=wrong;
  document.getElementById('sk').textContent=answers.filter(a=>a===null).length;
  document.getElementById('ss').textContent=correct;
  document.getElementById('pb').style.width=`${((i+1)/Q.length)*100}%`;
  document.getElementById('pt').textContent=`${i+1} / ${Q.length}`;
  document.getElementById('bpv').disabled=i===0;
  document.getElementById('bnx').textContent=i===Q.length-1?'Finish 🔥':'Next →';
}

function pick(qi,oi,container){
  if(answers[qi]!==null)return;
  answers[qi]=oi;
  const q=Q[qi];
  container.querySelectorAll('.opt').forEach((el,i)=>{
    el.classList.add('locked'); el.onclick=null;
    if(i===q.ans){el.classList.add('correct');el.querySelector('.oico').textContent='✓';}
    else if(i===oi&&i!==q.ans){el.classList.add('wrong');el.querySelector('.oico').textContent='✗';}
    else el.classList.add('dim');
  });
  if(oi===q.ans) correct++; else wrong++;
  ['sc2','sw','sk','ss'].forEach(id=>document.getElementById(id).textContent=
    id==='sc2'?correct:id==='sw'?wrong:id==='sk'?answers.filter(a=>a===null).length:correct);
  const eb=document.getElementById('eb');
  eb.innerHTML=`💡 <strong>Explanation:</strong> ${q.exp}`; eb.classList.add('show');
}

function go(d){
  const n=cur+d;
  if(n>=Q.length){showResult();return;}
  if(n<0)return;
  cur=n;
  const c=document.getElementById('qcard');
  c.style.animation='none';c.offsetHeight;c.style.animation='slIn .35s ease';
  render(cur);
}

function showResult(){
  document.getElementById('qcard').style.display='none';
  document.querySelector('.nav').style.display='none';
  document.querySelector('.prog-wrap').style.display='none';
  const sk=Q.length-correct-wrong;
  const pct=Math.round((correct/Q.length)*100);
  document.getElementById('rsc').textContent=correct;
  document.getElementById('rc2').textContent=correct;
  document.getElementById('rw').textContent=wrong;
  document.getElementById('rk').textContent=sk;

  let t,m;
  if(pct>=83){t='BOARD TOPPER 🏆';m='Exceptional! You have mastered CBSE BST MCQ patterns completely.';}
  else if(pct>=66){t='EXCELLENT ⭐';m='Strong grasp of hard questions. Review the wrong ones and you\'re set!';}
  else if(pct>=50){t='GOOD JOB 👏';m='Decent attempt. Focus on A&R and Statement I/II traps.';}
  else if(pct>=33){t='KEEP GOING 📖';m='Revise NCERT thoroughly + watch Sunil Panda / Rajat Arora lectures.';}
  else {t='DON\'T STOP 💪';m='Hard level hai yaar! Notes review karo, ek baar aur try karo. You\'ll crack it!';}

  document.getElementById('rt').textContent=t;
  document.getElementById('rm').textContent=m;

  // Chapter report
  const map={};
  Q.forEach((q,i)=>{
    if(!map[q.u])map[q.u]={t:0,c:0};
    map[q.u].t++;
    if(answers[i]===q.ans)map[q.u].c++;
  });
  let html='<div class="crep-hd">📊 Chapter-wise Report</div>';
  Object.entries(map).forEach(([ch,{t,c}])=>{
    const p=Math.round((c/t)*100);
    const cls=p>=70?'good':p>=40?'ok':'bad';
    const fcls=p>=70?'pfgood':p>=40?'pfok':'pfbad';
    html+=`<div class="crow"><span class="cn">${ch}</span><div style="text-align:right"><span class="cs ${cls}">${c}/${t} · ${p}%</span><div class="perfbar"><div class="perfbar-fill ${fcls}" style="width:${p}%"></div></div></div></div>`;
  });
  document.getElementById('crep').innerHTML=html;
  document.getElementById('res').classList.add('show');
  document.getElementById('res').scrollIntoView({behavior:'smooth'});
  if(pct>=50)confetti();
}

function confetti(){
  const cols=['#ff6b35','#4ecdc4','#ffd166','#06d6a0','#ef476f','#9b5de5'];
  for(let i=0;i<80;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='cf';
      const s=3+Math.random()*7;
      el.style.cssText=`width:${s}px;height:${s*1.6}px;background:${cols[Math.floor(Math.random()*cols.length)]};left:${Math.random()*100}vw;top:-10px;animation-duration:${2+Math.random()*2.5}s;animation-delay:${Math.random()}s;border-radius:2px;`;
      document.body.appendChild(el);setTimeout(()=>el.remove(),5000);
    },i*35);
  }
}

function restart(){
  answers=new Array(Q.length).fill(null);correct=0;wrong=0;cur=0;
  document.getElementById('qcard').style.display='block';
  document.querySelector('.nav').style.display='flex';
  document.querySelector('.prog-wrap').style.display='flex';
  document.getElementById('res').classList.remove('show');
  render(0);window.scrollTo({top:0,behavior:'smooth'});
}

render(0);
</script>
</body>
</html>
